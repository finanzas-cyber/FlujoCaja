        <div class="modal-detalle-header">

            </div>

            <button type="button" id="cerrar-modal-detalle" class="modal-detalle-cerrar">

        </div>

        <div class="modal-detalle-body">

                    <thead>
                        <tr>
                            <th>Fecha</th>
