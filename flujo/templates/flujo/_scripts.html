<script>
document.addEventListener("DOMContentLoaded", function () {

    function limpiarNumero(v) {
        return Number(String(v || "").replace(/\./g, "").replace(",", ".")) || 0;
    }

    function formatear(n) {
        return new Intl.NumberFormat("es-CL", {
            minimumFractionDigits: 0,
            maximumFractionDigits: 0
        }).format(Number(n) || 0);
    }

    function obtenerCsrf() {
        var tokenInput = document.querySelector('[name=csrfmiddlewaretoken]');
        return tokenInput ? tokenInput.value : "";
    }

    function marcarNegativoElemento(elemento, valor) {
        if (!elemento) return;
        if (Number(valor) < 0) {
            elemento.classList.add("negativo");
        } else {
            elemento.classList.remove("negativo");
        }
    }

    function obtenerUrlGuardado(input) {
        return input.dataset.origen === "REAL"
            ? "{% url 'guardar_movimiento_real' %}"
            : "{% url 'guardar_proyeccion' %}";
    }

    function guardarValorInput(input, valor, recargarAlFinal) {
        var conceptoId = input.dataset.conceptoId;
        var mes = input.dataset.mes;
        var anio = input.dataset.anio;

        input.readOnly = true;

        if (!conceptoId || !mes || !anio) {
            input.value = valor === 0 ? "" : formatear(valor);
            marcarNegativoElemento(input, valor);
            return Promise.resolve({ ok: true, sin_guardado: true });
        }

        return fetch(obtenerUrlGuardado(input), {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded",
                "X-CSRFToken": obtenerCsrf(),
            },
            body: new URLSearchParams({
                concepto_id: conceptoId,
                mes: mes,
                anio: anio,
                monto: valor
            }),
        })
        .then(function (r) { return r.json(); })
        .then(function (data) {
            if (!data.ok) {
                throw new Error(data.error || "Error al guardar");
            }

            input.classList.add("guardado-ok");
            input.value = valor === 0 ? "" : formatear(valor);
            marcarNegativoElemento(input, valor);

            setTimeout(function () {
                input.classList.remove("guardado-ok");
            }, 800);

            if (recargarAlFinal) {
                location.reload();
            }

            return data;
        })
        .catch(function () {
            input.classList.add("guardado-error");
            input.value = valor === 0 ? "" : formatear(valor);
            marcarNegativoElemento(input, valor);
            throw new Error("Error al guardar");
        });
    }

    function prepararInput(input) {
        var v = limpiarNumero(input.value);
        input.value = v === 0 ? "" : formatear(v);
        marcarNegativoElemento(input, v);

        if (input.hasAttribute("readonly")) {
            return;
        }

        input.readOnly = true;
        input.dataset.modoExcel = "1";
        input.style.cursor = "default";

        input.addEventListener("dblclick", function (e) {
            e.stopPropagation();
            input.readOnly = false;
            input.focus();
            var val = limpiarNumero(input.value);
            input.value = val === 0 ? "" : String(val);
            input.select();
        });

        input.addEventListener("keydown", function (e) {
            if (e.key === "Enter") {
                e.preventDefault();
                input.blur();
            }

            if (e.key === "Escape") {
                var val = limpiarNumero(input.value);
                input.value = val === 0 ? "" : formatear(val);
                input.readOnly = true;
                input.blur();
            }
        });

        input.addEventListener("blur", function () {
            var valor = limpiarNumero(input.value);
            guardarValorInput(input, valor, true).catch(function () {});
        });
    }

    function aplicarFormatoNumeros() {
        document.querySelectorAll(".js-numero").forEach(function (el) {
            var valor = limpiarNumero(el.dataset.value || el.textContent);
            el.textContent = formatear(valor);
            marcarNegativoElemento(el, valor);
        });

        document.querySelectorAll(".input-proyectado").forEach(function (el) {
            var valor = limpiarNumero(el.value);
            el.value = valor === 0 ? "" : formatear(valor);
            marcarNegativoElemento(el, valor);
        });
    }

    function obtenerGrupoPeriodo(anio, mes) {
        anio = Number(anio);
        mes = Number(mes);

        if (anio === 2025 && mes >= 7 && mes <= 12) return "2025s2";
        if (anio === 2026 && mes >= 1 && mes <= 6) return "2026s1";
        if (anio === 2026 && mes >= 7 && mes <= 12) return "2026s2";
        return "";
    }

    function actualizarVistaPeriodos() {
        var mostrar2025s2 = document.getElementById("check-2025s2").checked;
        var mostrar2026s1 = document.getElementById("check-2026s1").checked;
        var mostrar2026s2 = document.getElementById("check-2026s2").checked;

        document.querySelectorAll(".semestre-col").forEach(function (el) {
            var grupo = obtenerGrupoPeriodo(el.dataset.anio, el.dataset.mes);
            var visible = true;

            if (grupo === "2025s2") visible = mostrar2025s2;
            if (grupo === "2026s1") visible = mostrar2026s1;
            if (grupo === "2026s2") visible = mostrar2026s2;

            el.classList.toggle("oculto-semestre", !visible);
        });
    }

    function seleccionarTodo() {
        document.getElementById("check-2025s2").checked = true;
        document.getElementById("check-2026s1").checked = true;
        document.getElementById("check-2026s2").checked = true;
        actualizarVistaPeriodos();
    }

    function limpiarSeleccion() {
        document.getElementById("check-2025s2").checked = false;
        document.getElementById("check-2026s1").checked = false;
        document.getElementById("check-2026s2").checked = false;
        actualizarVistaPeriodos();
    }

    function prepararGrupos() {
        document.querySelectorAll(".boton-grupo").forEach(function (boton) {
            boton.addEventListener("click", function () {
                var group = boton.dataset.group;
                var expandido = boton.getAttribute("aria-expanded") === "true";
                var nuevoEstado = !expandido;

                document.querySelectorAll('.detalle-grupo[data-group="' + group + '"]').forEach(function (fila) {
                    fila.classList.toggle("detalle-oculto", !nuevoEstado);
                });

                boton.setAttribute("aria-expanded", nuevoEstado ? "true" : "false");
                boton.textContent = nuevoEstado ? "-" : "+";
            });
        });
    }

    function prepararFiltrosMovimientos() {
        var filtros = Array.from(document.querySelectorAll(".filtro-columna"));
        var filas = Array.from(document.querySelectorAll("#tbody-movimientos tr"));

        function aplicarFiltros() {
            filas.forEach(function (fila) {
                var visible = true;

                filtros.forEach(function (input) {
                    if (!visible) return;

                    var col = Number(input.dataset.col);
                    var valor = (input.value || "").trim().toLowerCase();
                    var celda = fila.cells[col];
                    var texto = celda ? celda.textContent.trim().toLowerCase() : "";

                    if (valor && texto.indexOf(valor) === -1) {
                        visible = false;
                    }
                });

                fila.style.display = visible ? "" : "none";
            });
        }

        filtros.forEach(function (input) {
            input.addEventListener("input", aplicarFiltros);
        });
    }

    var modal = document.getElementById("modal-detalle-real");
    var modalTitulo = document.getElementById("modal-detalle-titulo");
    var modalSubtitulo = document.getElementById("modal-detalle-subtitulo");
    var modalEstado = document.getElementById("modal-detalle-estado");
    var modalTbody = document.getElementById("modal-detalle-tbody");
    var modalTotal = document.getElementById("modal-detalle-total");
    var cerrarModalBtn = document.getElementById("cerrar-modal-detalle");

    function cerrarModalDetalle() {
        if (modal) {
            modal.classList.remove("abierto");
        }
    }

    function abrirModalDetalle() {
        if (modal) {
            modal.classList.add("abierto");
        }
    }

    function prepararModalDetalleReal() {
        document.querySelectorAll("[data-detalle-real='1']").forEach(function (celda) {
            celda.addEventListener("click", function () {
                var conceptoId = celda.dataset.conceptoId;
                var conceptoCodigo = celda.dataset.conceptoCodigo || "";
                var conceptoNombre = celda.dataset.conceptoNombre || "";
                var mes = celda.dataset.mes;
                var anio = celda.dataset.anio;
                var mesNombre = celda.dataset.mesNombre || "";

                if (modalTitulo) modalTitulo.textContent = "Detalle movimientos";
                if (modalSubtitulo) modalSubtitulo.textContent = conceptoCodigo + " - " + conceptoNombre + " | " + mesNombre + " " + anio;
                if (modalEstado) modalEstado.textContent = "Cargando detalle...";
                if (modalTbody) modalTbody.innerHTML = "";
                if (modalTotal) modalTotal.textContent = "";
                abrirModalDetalle();

                var url = "{% url 'detalle_movimientos_real' %}?" + new URLSearchParams({
                    concepto_id: conceptoId,
                    mes: mes,
                    anio: anio
                }).toString();

                fetch(url)
                    .then(function (r) { return r.json(); })
                    .then(function (data) {
                        if (!data.ok) {
                            throw new Error(data.error || "No se pudo cargar el detalle");
                        }

                        if (modalTitulo) modalTitulo.textContent = data.concepto_codigo + " - " + data.concepto_nombre;
                        if (modalSubtitulo) modalSubtitulo.textContent = "Mes " + data.mes + " / Año " + data.anio;

                        if (!data.movimientos || !data.movimientos.length) {
                            if (modalEstado) modalEstado.textContent = "No hay movimientos para este período.";
                            if (modalTbody) modalTbody.innerHTML = "";
                            if (modalTotal) modalTotal.textContent = "Total: 0";
                            return;
                        }

                        if (modalEstado) modalEstado.textContent = data.movimientos.length + " movimiento(s) encontrados.";
                        if (modalTbody) modalTbody.innerHTML = "";

                        data.movimientos.forEach(function (mov) {
                            var tr = document.createElement("tr");

                            var tdFecha = document.createElement("td");
                            tdFecha.textContent = mov.fecha || "";

                            var tdCpb = document.createElement("td");
                            tdCpb.textContent = mov.cpbnum || "";

                            var tdCuenta = document.createElement("td");
                            tdCuenta.textContent = mov.cuenta || "";

                            var tdDescripcion = document.createElement("td");
                            tdDescripcion.textContent = mov.descripcion || "";

                            var tdMonto = document.createElement("td");
                            tdMonto.className = "numero";
                            var montoNum = limpiarNumero(mov.monto);
                            tdMonto.textContent = formatear(montoNum);
                            marcarNegativoElemento(tdMonto, montoNum);

                            tr.appendChild(tdFecha);
                            tr.appendChild(tdCpb);
                            tr.appendChild(tdCuenta);
                            tr.appendChild(tdDescripcion);
                            tr.appendChild(tdMonto);

                            if (modalTbody) {
                                modalTbody.appendChild(tr);
                            }
                        });

                        var totalNum = Number(data.total) || 0;
                        if (modalTotal) {
                            modalTotal.textContent = "Total: " + formatear(totalNum);
                            marcarNegativoElemento(modalTotal, totalNum);
                        }
                    })
                    .catch(function (error) {
                        if (modalEstado) modalEstado.textContent = error.message || "Error al cargar el detalle.";
                        if (modalTbody) modalTbody.innerHTML = "";
                        if (modalTotal) modalTotal.textContent = "";
                    });
            });
        });

        if (cerrarModalBtn) {
            cerrarModalBtn.addEventListener("click", cerrarModalDetalle);
        }

        if (modal) {
            modal.addEventListener("click", function (e) {
                if (e.target === modal) {
                    cerrarModalDetalle();
                }
            });
        }

        document.addEventListener("keydown", function (e) {
            if (e.key === "Escape" && modal && modal.classList.contains("abierto")) {
                cerrarModalDetalle();
            }
        });
    }

    var seleccionandoSuma = false;
    var celdasSeleccionadasSuma = [];

    function getCellRowIndex(celda) {
        return celda.parentElement.rowIndex;
    }

    function getCellColIndex(celda) {
        return celda.cellIndex;
    }

    function ordenarCeldasSeleccionadas() {
        celdasSeleccionadasSuma.sort(function (a, b) {
            var ra = getCellRowIndex(a);
            var rb = getCellRowIndex(b);
            if (ra !== rb) return ra - rb;
            return getCellColIndex(a) - getCellColIndex(b);
        });
    }

    function limpiarSeleccionSuma() {
        celdasSeleccionadasSuma.forEach(function (celda) {
            celda.classList.remove("celda-seleccionada");
        });
        celdasSeleccionadasSuma = [];
        actualizarBarraSuma();
    }

    function obtenerValorCeldaSuma(celda) {
        if (!celda) return 0;

        var input = celda.querySelector("input");
        if (input) {
            return limpiarNumero(input.value);
        }

        var span = celda.querySelector(".js-numero");
        if (span) {
            return limpiarNumero(span.dataset.value || span.textContent);
        }

        return limpiarNumero(celda.dataset.value || celda.textContent);
    }

    function actualizarBarraSuma() {
        var total = celdasSeleccionadasSuma.reduce(function (acum, celda) {
            return acum + obtenerValorCeldaSuma(celda);
        }, 0);

        var barra = document.getElementById("barra-suma");
        if (barra) {
            barra.textContent =
                "Suma seleccionada: " + formatear(total) +
                " | Celdas: " + celdasSeleccionadasSuma.length;
            barra.style.display = "block";
            barra.style.visibility = "visible";
            barra.style.opacity = "1";
        }
    }

    function construirTextoCopiado() {
        if (!celdasSeleccionadasSuma.length) return "";

        ordenarCeldasSeleccionadas();

        var filas = {};
        var filasOrden = [];

        celdasSeleccionadasSuma.forEach(function (celda) {
            var r = getCellRowIndex(celda);
            var c = getCellColIndex(celda);

            if (!filas[r]) {
                filas[r] = {};
                filasOrden.push(r);
            }

            filas[r][c] = obtenerValorCeldaSuma(celda);
        });

        filasOrden.sort(function (a, b) { return a - b; });

        var lineas = filasOrden.map(function (r) {
            var cols = Object.keys(filas[r]).map(Number).sort(function (a, b) { return a - b; });
            return cols.map(function (c) {
                return filas[r][c];
            }).join("\t");
        });

        return lineas.join("\n");
    }

    function copiarSeleccionAlPortapapeles(e) {
        if (!celdasSeleccionadasSuma.length) return false;

        var texto = construirTextoCopiado();

        if (e && e.clipboardData) {
            e.clipboardData.setData("text/plain", texto);
            e.preventDefault();
            return true;
        }

        return false;
    }

    function obtenerMatrizDesdeTexto(texto) {
        return texto
            .trim()
            .split(/\r?\n/)
            .map(function (linea) {
                return linea.split("\t").map(function (v) {
                    return limpiarNumero(v);
                });
            });
    }

    function pegarValoresDesdeTexto(texto) {
        if (!texto || !celdasSeleccionadasSuma.length) return;

        ordenarCeldasSeleccionadas();

        var matriz = obtenerMatrizDesdeTexto(texto);
        if (!matriz.length) return;

        var filas = matriz.length;
        var cols = Math.max.apply(null, matriz.map(function (r) { return r.length; }));

        var anchor = celdasSeleccionadasSuma[0];
        var tabla = anchor.closest("table");
        if (!tabla) return;

        var rowStart = anchor.parentElement.rowIndex;
        var colStart = anchor.cellIndex;

        var promesas = [];

        for (var r = 0; r < filas; r++) {
            var tr = tabla.rows[rowStart + r];
            if (!tr) continue;

            for (var c = 0; c < cols; c++) {
                var td = tr.cells[colStart + c];
                if (!td) continue;

                var input = td.querySelector("input");
                if (!input) continue;

                if (input.hasAttribute("readonly") && !input.dataset.modoExcel) continue;

                var valor = (matriz[r] && matriz[r][c] !== undefined) ? matriz[r][c] : 0;

                input.readOnly = false;
                input.value = valor === 0 ? "" : String(valor);

                promesas.push(
                    guardarValorInput(input, valor, false).catch(function () {})
                );
            }
        }

        Promise.all(promesas).then(function () {
            if (promesas.length) {
                location.reload();
            }
        });
    }

    function eliminarCeldasSeleccionadas() {
        if (!celdasSeleccionadasSuma.length) return;

        ordenarCeldasSeleccionadas();

        var promesas = [];

        celdasSeleccionadasSuma.forEach(function (celda) {
            var input = celda.querySelector("input");
            if (!input) return;

            if (input.hasAttribute("readonly") && !input.dataset.modoExcel) return;

            input.readOnly = false;
            input.value = "";

            promesas.push(
                guardarValorInput(input, 0, false).catch(function () {})
            );
        });

        Promise.all(promesas).then(function () {
            if (promesas.length) {
                location.reload();
            }
        });
    }

    function prepararSumaCeldas() {
        var encabezado = document.getElementById("toggle-tc");
        if (!encabezado) return;

        var tabla = encabezado.closest("table");
        if (!tabla) return;

        var celdas = tabla.querySelectorAll("td.semestre-col.numero");
        celdas.forEach(function (celda) {
            celda.classList.add("celda-sumable");
        });

        tabla.addEventListener("mousedown", function (e) {
            var input = e.target.closest("input");
            if (input && input.readOnly === false) return;

            var celda = e.target.closest("td.semestre-col.numero");
            if (!celda || !tabla.contains(celda)) return;

            if (e.detail === 2) return;

            e.preventDefault();

            if (!e.ctrlKey) {
                limpiarSeleccionSuma();
            }

            seleccionandoSuma = true;

            if (!celdasSeleccionadasSuma.includes(celda)) {
                celda.classList.add("celda-seleccionada");
                celdasSeleccionadasSuma.push(celda);
            }

            actualizarBarraSuma();
        });

        tabla.addEventListener("mouseover", function (e) {
            if (!seleccionandoSuma) return;

            var celda = e.target.closest("td.semestre-col.numero");
            if (!celda || !tabla.contains(celda)) return;

            if (!celdasSeleccionadasSuma.includes(celda)) {
                celda.classList.add("celda-seleccionada");
                celdasSeleccionadasSuma.push(celda);
                actualizarBarraSuma();
            }
        });

        document.addEventListener("mouseup", function () {
            seleccionandoSuma = false;
        });

        document.addEventListener("keydown", function (e) {
            if (e.key === "Escape") {
                limpiarSeleccionSuma();
                return;
            }

            if (e.key === "Delete" || e.key === "Backspace") {
                var activo = document.activeElement;
                var editandoInput = activo && activo.tagName === "INPUT" && activo.readOnly === false;
                if (editandoInput) return;

                if (!celdasSeleccionadasSuma.length) return;

                e.preventDefault();
                eliminarCeldasSeleccionadas();
                return;
            }
        });

        document.addEventListener("copy", function (e) {
            copiarSeleccionAlPortapapeles(e);
        });

        document.addEventListener("paste", function (e) {
            if (!celdasSeleccionadasSuma.length) return;
            var texto = e.clipboardData ? e.clipboardData.getData("text/plain") : "";
            if (!texto) return;
            e.preventDefault();
            pegarValoresDesdeTexto(texto);
        });
    }

    var encabezadoConcepto = document.getElementById("toggle-tc");
    if (encabezadoConcepto) {
        encabezadoConcepto.style.cursor = "default";

        encabezadoConcepto.addEventListener("click", function () {
            document.querySelectorAll(".fila-diferencia-tc").forEach(function (fila) {
                var visible = window.getComputedStyle(fila).display !== "none";
                fila.style.display = visible ? "none" : "table-row";
            });
        });
    }

    document.querySelectorAll(".input-proyectado, .input-real").forEach(prepararInput);

    aplicarFormatoNumeros();
    prepararGrupos();
    prepararFiltrosMovimientos();
    prepararModalDetalleReal();
    prepararSumaCeldas();
    actualizarVistaPeriodos();
    actualizarBarraSuma();

    window.seleccionarTodo = seleccionarTodo;
    window.limpiarSeleccion = limpiarSeleccion;
    window.actualizarVistaPeriodos = actualizarVistaPeriodos;
});
</script>
